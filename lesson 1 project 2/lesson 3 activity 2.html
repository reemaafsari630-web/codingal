<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  <h2>An ordered HTML list:</h2>
  <ol>
    <li>watermelon</li>
    <li>apple</li>
    <li>mango</li>
    <li>grapes</li>
  </ol>

  <h2>An unordered HTML list:</h2>
  <ul>
    <li>carrot</li>
    <li>cabbage</li>
    <li>cucumber</li>
    <li>raddish</li>
  </ul>

  <h2>Definition list:</h2>
  <dl>
    <dt>Tea</dt>
    <dd>- hot drink</dd>

    <dt>Juice</dt>
    <dd>- ice drink</dd>
  </dl>
</body>
